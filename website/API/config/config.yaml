# 服务器配置
server:
  port: 8080
  mode: release # debug, release, test
  read_timeout: 30
  write_timeout: 30

# 数据库配置
database:
  driver: sqlite # sqlite, mysql, postgres
  host: localhost
  port: 3306
  username: root
  password: root
  dbname: ai_relay
  charset: utf8mb4
  max_open_conns: 100
  max_idle_conns: 20
  log_level: info

# JWT配置
jwt:
  secret: "your-super-secret-key-change-me-in-production"
  expire_hours: 24
  refresh_expire_hours: 168

# 加密配置
encryption:
  aes_key: "32bytes-aes-256-key-here!!!!" # 必须32字节
  api_key_salt: "api-key-salt-value"

# SMTP邮件配置
smtp:
  host: smtp.gmail.com
  port: 587
  username: "your-email@gmail.com"
  password: "your-password"
  from: "AI中转平台 <noreply@aichat.com>"
  enabled: false

# 支付配置
payment:
  alipay:
    enabled: false
    app_id: ""
    private_key: ""
    public_key: ""
    notify_url: "http://localhost:8080/api/v1/payment/notify/alipay"
    gateway: "https://openapi.alipaydev.com/gateway.do" # 沙箱
  wechat:
    enabled: false
    app_id: ""
    mch_id: ""
    api_key: ""
    notify_url: "http://localhost:8080/api/v1/payment/notify/wechat"
  stripe:
    enabled: false
    secret_key: ""
    publishable_key: ""
    webhook_secret: ""

# 限流配置
ratelimit:
  enabled: true
  global_rps: 1000 # 全局每秒请求数
  user_rps: 60 # 单用户每秒请求数
  ip_rps: 30 # 单IP每秒请求数
  burst: 50

# 签名配置
signature:
  enabled: true
  expire_seconds: 300 # 签名过期时间

# 日志配置
log:
  level: info
  format: json
  output: stdout
  file: ""

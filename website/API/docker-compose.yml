version: '3.8'

services:
  api:
    build: .
    container_name: ai-relay-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=release
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - mysql
    networks:
      - ai-net

  mysql:
    image: mysql:8.0
    container_name: ai-relay-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: ai_relay
      MYSQL_USER: airelay
      MYSQL_PASSWORD: airelay_pass
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - ai-net

  redis:
    image: redis:7-alpine
    container_name: ai-relay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-net

  nginx:
    image: nginx:alpine
    container_name: ai-relay-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - ai-net

volumes:
  mysql_data:
  redis_data:

networks:
  ai-net:
    driver: bridge
